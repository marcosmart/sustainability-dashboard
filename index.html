<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terralume · Client Dashboard</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        color: #0a7d77;
        background: #eef4f3;
      }
      #loading .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #00aca0;
        display: inline-block;
        margin: 0 3px;
        animation: b 1s infinite ease-in-out;
      }
      #loading .dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      #loading .dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes b {
        0%,
        80%,
        100% {
          transform: scale(0.5);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
      #err {
        padding: 28px;
        font-family: ui-monospace, monospace;
        color: #c8513c;
        white-space: pre-wrap;
        line-height: 1.5;
      }
    </style>

    <!-- Resolve the bare imports inside the component to CDN modules -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react,react-dom"
        }
      }
    </script>

    <!-- Compiles JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading">
      <span class="dot"></span><span class="dot"></span
      ><span class="dot"></span>
    </div>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      // Change this if you rename the component file.
      const FILE = "./TerralumeDashboard.jsx";

      const root = createRoot(document.getElementById("root"));
      const loading = document.getElementById("loading");

      try {
        const res = await fetch(FILE);
        if (!res.ok)
          throw new Error(
            "Could not find " + FILE + " (HTTP " + res.status + ")",
          );
        const source = await res.text();

        // Transpile JSX, keeping the ES module imports intact.
        const compiled = Babel.transform(source, {
          presets: ["react"],
          filename: "App.jsx",
        }).code;

        // Run the compiled module so its imports resolve through the import map.
        const blobUrl = URL.createObjectURL(
          new Blob([compiled], { type: "text/javascript" }),
        );
        const module = await import(blobUrl);
        const App = module.default;

        loading.remove();
        root.render(React.createElement(App));
      } catch (e) {
        loading.remove();
        root.innerHTML =
          '<pre id="err">Could not load the dashboard.\n\n' +
          (e && e.message ? e.message : e) +
          "\n\nChecklist:\n  1. index.html and the .jsx file are in the same folder.\n" +
          "  2. You are viewing this through Live Server (http://127.0.0.1:5500), not by opening the file directly.\n" +
          "  3. You are connected to the internet (the libraries load from a CDN).</pre>";
        console.error(e);
      }
    </script>
  </body>
</html>
